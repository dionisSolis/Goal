services:
  - type: web
    name: goal-tracker-backend
    runtime: image
    repo: https://github.com/dionisSolis/Goal # ← ВАШ URL репозитория
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: goal-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PORT
        value: 8000

  - type: web
    name: goal-tracker-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://goal-tracker-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: goal-tracker-db
    plan: free