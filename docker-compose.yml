services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: goal_db
      POSTGRES_USER: goal_user
      POSTGRES_PASSWORD: goal_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_NAME=goal_db
      - DB_USER=goal_user
      - DB_PASSWORD=goal_password
      - DB_HOST=db
      - DB_PORT=5432

  frontend:
    build: ./frontend
    command: npm start
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - BROWSER=none

volumes:
  postgres_data: